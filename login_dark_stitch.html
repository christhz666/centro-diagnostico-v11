<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedTech OS - Diagnostic Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#10131a",
                        "on-tertiary-fixed": "#281900",
                        "primary-fixed": "#47fbed",
                        "inverse-on-surface": "#2e3037",
                        "background": "#10131a",
                        "surface-container": "#1d2026",
                        "on-tertiary-container": "#714d00",
                        "outline": "#849491",
                        "primary-container": "#00e0d3",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#006a64",
                        "error-container": "#93000a",
                        "surface-dim": "#10131a",
                        "surface-container-lowest": "#0b0e14",
                        "on-secondary-fixed": "#00201e",
                        "on-secondary-container": "#87c0b9",
                        "on-tertiary-fixed-variant": "#604100",
                        "tertiary-fixed-dim": "#fcbb48",
                        "outline-variant": "#3b4a48",
                        "secondary-fixed": "#b3eee7",
                        "on-error": "#690005",
                        "on-tertiary": "#432c00",
                        "secondary": "#98d1ca",
                        "secondary-container": "#104f4a",
                        "primary": "#4afdef",
                        "on-surface-variant": "#bacac7",
                        "secondary-fixed-dim": "#98d1ca",
                        "tertiary": "#ffe0b5",
                        "on-secondary-fixed-variant": "#104f4a",
                        "on-background": "#e1e2eb",
                        "surface-variant": "#32353c",
                        "on-primary-container": "#005e59",
                        "surface-bright": "#363940",
                        "surface-tint": "#00ded1",
                        "on-primary-fixed": "#00201e",
                        "inverse-surface": "#e1e2eb",
                        "surface-container-low": "#191c22",
                        "primary-fixed-dim": "#00ded1",
                        "on-primary-fixed-variant": "#00504b",
                        "on-surface": "#e1e2eb",
                        "surface-container-highest": "#32353c",
                        "on-secondary": "#003733",
                        "tertiary-container": "#ffbd4a",
                        "error": "#ffb4ab",
                        "on-primary": "#003733",
                        "surface-container-high": "#272a31",
                        "tertiary-fixed": "#ffdeae"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #10131a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 224, 211, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 106, 100, 0.1) 0px, transparent 50%);
        }
        .glass-panel {
            background: rgba(29, 32, 38, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .clinical-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 bg-mesh">
<!-- Supressing SideNav and TopAppBar as per "Destination Rule" (Transactional Page) -->
<main class="w-full max-w-[440px]">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(0,224,211,0.3)]">
<span class="material-symbols-outlined text-on-primary-fixed text-4xl" data-icon="clinical_notes">clinical_notes</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">MedTech OS</h1>
<p class="text-on-surface-variant font-label text-sm tracking-wide uppercase">Diagnostic Intelligence Portal</p>
</div>
<!-- Login Card -->
<div class="glass-panel border border-outline-variant/20 rounded-xl p-8 clinical-shadow">
<div class="mb-8">
<h2 class="font-headline text-xl font-bold text-on-surface">Secure Access</h2>
<p class="text-on-surface-variant text-sm mt-1">Authorized medical personnel only.</p>
</div>
<form action="#" class="space-y-6">
<!-- Input Group: Email -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Clinical Identifier</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full h-12 bg-surface-container-highest border-none rounded-lg pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 focus:bg-surface-container-high transition-all" id="email" name="email" placeholder="dr.smith@medtech.com" required="" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Access Token</label>
<a class="text-primary text-xs font-semibold hover:underline decoration-primary/30" href="#">Reset Token</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
</div>
<input class="w-full h-12 bg-surface-container-highest border-none rounded-lg pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 focus:bg-surface-container-high transition-all" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<div class="relative flex items-center h-5">
<input class="h-5 w-5 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary/30 focus:ring-offset-surface cursor-pointer" id="remember" name="remember" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="text-on-surface-variant cursor-pointer select-none" for="remember">Maintain encrypted session</label>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-headline font-bold text-sm rounded-lg shadow-[0_4px_15px_rgba(0,224,211,0.2)] hover:shadow-[0_4px_25px_rgba(0,224,211,0.4)] hover:scale-[1.01] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Initialize Portal
                    <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-sm">New to the platform?</p>
<button class="w-full h-11 border border-outline-variant/30 hover:border-primary/50 hover:bg-white/5 text-on-surface font-label text-sm rounded-lg transition-all">
                    Register Facility
                </button>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-8 flex items-center justify-center gap-6">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#00e0d3]"></span>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant">Core Engine Online</span>
</div>
<div class="w-[1px] h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="encrypted">encrypted</span>
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant">256-bit AES</span>
</div>
<div class="w-[1px] h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant">v4.8.2-stable</span>
</div>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-secondary-container/10 blur-[150px] rounded-full"></div>
<!-- Subtle Grid Pattern -->
<div class="absolute inset-0 opacity-[0.02]" style="background-image: radial-gradient(#bacac7 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
</body></html>

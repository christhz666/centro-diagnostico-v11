# ============================================
# Centro Diagnóstico Mi Esperanza
# Docker Compose - Desarrollo y Producción
# ============================================

services:

  # ── API Backend (Express/Node.js) ──────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centro-diagnostico-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/centro_diagnostico
      - PORT=5000
      - HOST=0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - centro-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── MongoDB ────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: centro-diagnostico-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=centro_diagnostico
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - centro-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: mongod --quiet --logpath /dev/null

  # ── Nginx Reverse Proxy ────────────────────
  nginx:
    image: nginx:alpine
    container_name: centro-diagnostico-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - centro-net

# ── Volúmenes persistentes ──────────────────
volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  uploads_data:
    driver: local

# ── Red interna ──────────────────────────────
networks:
  centro-net:
    driver: bridge

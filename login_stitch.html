<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedTech OS - Diagnostic Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface": "#F5F7FA",
                "on-tertiary-fixed": "#281900",
                "primary-fixed": "#47fbed",
                "inverse-on-surface": "#2e3037",
                "background": "#F5F7FA",
                "surface-container": "#FFFFFF",
                "on-tertiary-container": "#714d00",
                "outline": "#849491",
                "primary-container": "#00e0d3",
                "on-error-container": "#ffdad6",
                "inverse-primary": "#006a64",
                "error-container": "#93000a",
                "surface-dim": "#e9ecef",
                "surface-container-lowest": "#FFFFFF",
                "on-secondary-fixed": "#00201e",
                "on-secondary-container": "#104f4a",
                "on-tertiary-fixed-variant": "#604100",
                "tertiary-fixed-dim": "#fcbb48",
                "outline-variant": "#e2e8f0",
                "secondary-fixed": "#b3eee7",
                "on-error": "#690005",
                "on-tertiary": "#432c00",
                "secondary": "#006a64",
                "secondary-container": "#d1f2ef",
                "primary": "#008a82",
                "on-surface-variant": "#64748b",
                "secondary-fixed-dim": "#98d1ca",
                "tertiary": "#ffe0b5",
                "on-secondary-fixed-variant": "#104f4a",
                "on-background": "#1e293b",
                "surface-variant": "#f1f5f9",
                "on-primary-container": "#003733",
                "surface-bright": "#ffffff",
                "surface-tint": "#00ded1",
                "on-primary-fixed": "#00201e",
                "inverse-surface": "#1e293b",
                "surface-container-low": "#f8fafc",
                "primary-fixed-dim": "#00ded1",
                "on-primary-fixed-variant": "#00504b",
                "on-surface": "#0f172a",
                "surface-container-highest": "#e2e8f0",
                "on-secondary": "#ffffff",
                "tertiary-container": "#ffbd4a",
                "error": "#ba1a1a",
                "on-primary": "#ffffff",
                "surface-container-high": "#f1f5f9",
                "tertiary-fixed": "#ffdeae"
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F5F7FA;
            font-family: 'Inter', sans-serif;
        }
        .clinical-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 antialiased">
<!-- Supress SideNav/TopAppBar for Login Page per UI Rules -->
<main class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Brand Header -->
<div class="flex flex-col items-center gap-4 text-center">
<div class="w-14 h-14 rounded-xl bg-primary-container flex items-center justify-center text-on-primary-container clinical-shadow">
<span class="material-symbols-outlined !text-3xl" data-icon="medical_services">medical_services</span>
</div>
<div class="space-y-1">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">MedTech OS</h1>
<p class="text-on-surface-variant font-body text-sm font-medium tracking-wide uppercase">Diagnostic Intelligence Portal</p>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container rounded-xl p-8 clinical-shadow flex flex-col gap-8">
<div class="space-y-2">
<h2 class="font-headline text-xl font-bold text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant text-sm font-body">Enter your clinical credentials to access the laboratory dashboard.</p>
</div>
<form class="space-y-6">
<!-- Input Fields -->
<div class="space-y-4">
<div class="space-y-1.5">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="email">Institutional Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-xl" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-0 focus:border-primary transition-all font-body text-sm" id="email" name="email" placeholder="name@medtech.org" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Security Key</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Reset key?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:outline-none focus:ring-0 focus:border-primary transition-all font-body text-sm" id="password" name="password" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined !text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<div class="flex items-center h-5">
<input class="h-4 w-4 text-primary border-outline-variant rounded focus:ring-primary transition-all bg-surface" id="remember" name="remember" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Maintain session for 12 hours</label>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full py-4 px-6 bg-primary-container text-on-primary-container font-headline font-bold text-sm rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all clinical-shadow" type="submit">
                    AUTHENTICATE
                    <span class="material-symbols-outlined !text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- SSO / Alternative Options -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest">Or Secure Login With</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-lg font-body text-sm font-semibold text-on-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined !text-xl text-[#4285F4]" data-icon="fingerprint">fingerprint</span>
                    Biometric
                </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-lg font-body text-sm font-semibold text-on-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined !text-xl" data-icon="smart_card">smart_card_reader</span>
                    HealthID
                </button>
</div>
</div>
<!-- Footer Help -->
<p class="text-center text-on-surface-variant text-xs font-body">
            Encrypted session. Required for HIPAA compliance. <br/>
            Need technical support? <a class="text-primary font-bold hover:underline" href="#">Contact Admin</a>
</p>
</main>
<!-- Visual Background Element -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
</div>
</body></html>
